<div class="bg-gray-50 border border-gray-200 rounded p-3 mt-1">
  <div class="text-xs font-semibold text-gray-700 mb-2">Top-30 stalest dimensions for <span class="font-mono">{{ metric_key }}</span></div>
  {% if dims %}
  <table class="min-w-full text-xs">
    <thead class="text-left text-gray-600">
      <tr><th class="py-1 pr-3">Dimension</th><th class="py-1 pr-3">Days</th><th class="py-1 pr-3">Obs</th></tr>
    </thead>
    <tbody>
      {% for d in dims %}
      <tr class="border-t border-gray-200">
        <td class="py-1 pr-3 font-mono text-xs">{{ d.dimension_key }}</td>
        <td class="py-1 pr-3">{{ d.days if d.days is not none else '—' }}</td>
        <td class="py-1 pr-3">{{ d.obs_count }}</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
  {% else %}
  <div class="text-xs text-gray-500">No dimensional breakdowns recorded for this metric.</div>
  {% endif %}
</div>
